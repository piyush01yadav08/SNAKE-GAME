<!DOCTYPE html>
<html>
<head>
  <title>Snake Game</title>
  <style>
    body {
      background: black;
      color: #00ff00;
      text-align: center;
      font-family: monospace;
    }

    canvas {
      border: 2px solid #00ff00;
      margin-top: 20px;
      background: #000;
    }

    button {
      margin: 5px;
      padding: 10px;
      background: black;
      color: #00ff00;
      border: 1px solid #00ff00;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🐍 Snake Game</h1>
<h2>Score: <span id="score">0</span></h2>

<canvas id="game" width="400" height="400"></canvas>

<br>
<button onclick="togglePause()">⏸ Pause</button>
<button onclick="restartGame()">🔄 Restart</button>
<br><br>
<a href="../index.html">⬅ Back</a>

<!-- Sounds -->
<audio id="eatSound" src="https://www.soundjay.com/button/beep-07.wav"></audio>
<audio id="gameOverSound" src="https://www.soundjay.com/misc/fail-buzzer-02.wav"></audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let snake, food, dx, dy, score;
let speed = 120;
let lastTime = 0;
let paused = false;
let snakeColor;

function randomColor() {
  const colors = ["#00ff00","#00ffff","#ff00ff","#ffff00","#ff6600"];
  return colors[Math.floor(Math.random() * colors.length)];
}

function init() {
  snake = [{x: 200, y: 200}];
  dx = 20;
  dy = 0;
  score = 0;
  speed = 120;
  paused = false;
  snakeColor = randomColor();
  document.getElementById("score").textContent = score;
  food = randomFood();
  requestAnimationFrame(gameLoop);
}

function randomFood() {
  return {
    x: Math.floor(Math.random() * 20) * 20,
    y: Math.floor(Math.random() * 20) * 20
  };
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowUp" && dy === 0) { dx = 0; dy = -20; }
  if (e.key === "ArrowDown" && dy === 0) { dx = 0; dy = 20; }
  if (e.key === "ArrowLeft" && dx === 0) { dx = -20; dy = 0; }
  if (e.key === "ArrowRight" && dx === 0) { dx = 20; dy = 0; }
});

function gameLoop(currentTime) {
  if (paused) return;

  if (currentTime - lastTime < speed) {
    requestAnimationFrame(gameLoop);
    return;
  }

  lastTime = currentTime;

  // Background
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, 400, 400);

  // Grid
  ctx.strokeStyle = "#003300";
  for (let i = 0; i < 400; i += 20) {
    ctx.strokeRect(i, 0, 20, 400);
    ctx.strokeRect(0, i, 400, 20);
  }

  // Move snake
  let head = {x: snake[0].x + dx, y: snake[0].y + dy};

  if (
    head.x < 0 || head.x >= 400 ||
    head.y < 0 || head.y >= 400 ||
    collision(head)
  ) {
    document.getElementById("gameOverSound").play();
    alert("Game Over! Score: " + score);
    return;
  }

  snake.unshift(head);

  // Eat food
  if (head.x === food.x && head.y === food.y) {
    document.getElementById("eatSound").play();
    score++;
    document.getElementById("score").textContent = score;
    food = randomFood();

    // Increase speed
    if (speed > 60) speed -= 3;
  } else {
    snake.pop();
  }

  // Draw food
  ctx.fillStyle = "red";
  ctx.fillRect(food.x, food.y, 20, 20);

  // Glow effect
  ctx.shadowBlur = 20;
  ctx.shadowColor = snakeColor;

  // Draw snake
  ctx.fillStyle = snakeColor;
  snake.forEach(part => {
    ctx.fillRect(part.x, part.y, 20, 20);
  });

  ctx.shadowBlur = 0;

  requestAnimationFrame(gameLoop);
}

function collision(head) {
  return snake.some(part => part.x === head.x && part.y === head.y);
}

function togglePause() {
  paused = !paused;
  if (!paused) requestAnimationFrame(gameLoop);
}

function restartGame() {
  init();
}

// Start
init();
</script>

</body>
</html>
